<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio - ClinicApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { margin:0; background:#f4f6f9; font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        
        /* SIDEBAR UNIFICADO */
        .sidebar { width:240px; height:100vh; background:#4db6ac; position:fixed; color:white; padding-top:20px; transition:0.3s; z-index:1000; left: 0; }
        .sidebar.active { left: -240px; }
        .sidebar h4 { text-align:center; font-weight:bold; }
        .sidebar a { display:block; color:white; padding:12px 20px; text-decoration:none; transition:0.3s; }
        .sidebar a:hover, .sidebar a.active { background:#00838f; }
        
        /* CONTENIDO */
        .content { margin-left:240px; padding:30px; transition:0.3s; min-height: 100vh; }
        .content.active { margin-left: 0; }

        /* TOPBAR */
        .topbar { display:flex; justify-content:space-between; align-items:center; background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn-menu { background: #4db6ac; border: none; color: white; font-size: 20px; cursor: pointer; padding: 5px 12px; border-radius: 5px; display: block !important; }
        .btn-menu:hover { background: #00838f; }

        .notificacion { font-size:20px; cursor:pointer; background:#f4f6f9; padding:10px; border-radius:50%; transition: 0.3s; }

        /* TARJETAS */
        .card { border:none; border-radius:12px; box-shadow:0 4px 15px rgba(0,0,0,0.1); padding:20px; transition: 0.3s; }
        .verde { border-left:6px solid #4db6ac; }
        .naranja { border-left:6px solid #ff9800; }
        .azul { border-left:6px solid #2196f3; }

        /* NOTIFICACIÓN FLOTANTE */
        .mensaje-noti { position:fixed; top:20px; right:20px; background:#4db6ac; color:white; padding:15px 20px; border-radius:10px; display:none; z-index:9999; }

        @media (max-width:768px) {
            .sidebar { left:-240px; }
            .sidebar.active { left:0; }
            .content { margin-left:0; }
        }
    </style>
</head>

<body>

<div class="sidebar" id="sidebar">
    <h4 class="text-center">ClinicApp</h4>
    <hr>
    <a href="inicio.html" class="active"><i class="fa fa-home"></i> Inicio</a>
    <a href="doctores.html"><i class="fa fa-user-md"></i> Ver doctores</a>
    <a href="agendar-cita.html"><i class="fa fa-calendar-plus"></i> Agendar cita</a>
    <a href="estadocita.html"><i class="fa fa-clock"></i> Estado de cita</a>
    <a href="perfil.html"><i class="fa fa-user"></i> Perfil</a>
    <hr>
    <a href="../login.html" onclick="localStorage.clear()" class="text-danger"><i class="fa fa-sign-out-alt"></i> Cerrar sesión</a>
</div>

<div class="content" id="content">
    <div class="topbar">
        <div class="d-flex align-items-center gap-3">
            <button id="btnMenu" class="btn-menu"><i class="fa fa-bars"></i></button>
            <h2 class="m-0" style="font-size: 1.5rem;">Panel del Paciente</h2>
        </div>
        <div class="d-flex align-items-center">
            <i class="fa fa-bell notificacion" id="campana"></i>
        </div>
    </div>

    <p class="mt-4">Bienvenido al sistema de citas médicas</p>

    <div class="row mt-4">
        <div class="col-md-4 col-12 mb-3">
            <div class="card verde">
                <h6>PRÓXIMA CITA</h6>
                <p id="proximaFecha">Cargando...</p>
            </div>
        </div>
        <div class="col-md-4 col-12 mb-3">
            <div class="card naranja">
                <h6>ESTADO</h6>
                <p id="ultimoEstado">Cargando...</p>
            </div>
        </div>
        <div class="col-md-4 col-12 mb-3">
            <div class="card azul">
                <h6>TOTAL DE CITAS</h6>
                <h3 id="totalCitas">0</h3>
            </div>
        </div>
    </div>
</div>

<div id="mensajeNoti" class="mensaje-noti"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    const API_URL = "https://clinicaapi-production.up.railway.app";
    // CORRECCIÓN: Usamos id_paciente para que SQL no devuelva vacío
    const idPaciente = localStorage.getItem("id_paciente");

    document.addEventListener("DOMContentLoaded", () => {
        // Validación de sesión
        if (!idPaciente || idPaciente === "0" || idPaciente === "null") {
            window.location.href = "../login.html";
            return;
        }

        // LÓGICA HAMBURGUESA
        const btnMenu = document.getElementById("btnMenu");
        const sidebar = document.getElementById("sidebar");
        const content = document.getElementById("content");

        if (btnMenu) {
            btnMenu.onclick = () => {
                sidebar.classList.toggle("active");
                content.classList.toggle("active");
            };
        }

        // LÓGICA CAMPANA
        const btnCampana = document.getElementById("campana");
        if (btnCampana) {
            btnCampana.onclick = () => {
                mostrarNotificacion("No hay avisos urgentes hoy");
            };
        }

        cargarDashboardReal();
    });

    async function cargarDashboardReal() {
        const txtProximaCita = document.getElementById("proximaFecha");
        const txtEstado = document.getElementById("ultimoEstado");
        const txtTotalCitas = document.getElementById("totalCitas");

        try {
            // Consumimos el endpoint de citas del paciente que ya sabemos que funciona
            const respuesta = await fetch(`${API_URL}/pacientes/${idPaciente}/citas`);
            
            if (respuesta.ok) {
                const citas = await respuesta.json();

                if (!citas || citas.length === 0) {
                    txtProximaCita.innerText = "Sin citas agendadas";
                    txtEstado.innerText = "N/A";
                    txtTotalCitas.innerText = "0";
                    return;
                }

                // 1. Total de citas
                txtTotalCitas.innerText = citas.length;

                // 2. Última cita y su estado (la primera del array suele ser la más reciente)
                const ultimaCita = citas[0];
                txtEstado.innerText = ultimaCita.estado.toUpperCase();
                
                // Color dinámico para el estado en el texto
                if (ultimaCita.estado === "PENDIENTE") {
                    txtEstado.style.color = "#ff9800";
                    mostrarNotificacion("Tienes una cita esperando confirmación");
                } else if (ultimaCita.estado === "ACEPTADA") {
                    txtEstado.style.color = "#4db6ac";
                }

                // 3. Próxima fecha (buscamos la primera que sea PENDIENTE o ACEPTADA)
                const proxima = citas.find(c => c.estado !== "RECHAZADA");
                if (proxima) {
                    txtProximaCita.innerHTML = `<strong>${proxima.fecha}</strong> a las ${proxima.hora}`;
                } else {
                    txtProximaCita.innerText = "No hay citas activas";
                }

            } else {
                throw new Error("Error en servidor");
            }
        } catch (error) {
            console.error("Error de conexión:", error);
            txtProximaCita.innerText = "Error de red";
            txtEstado.innerText = "Error";
            txtTotalCitas.innerText = "--";
        }
    }

    function mostrarNotificacion(texto) {
        const mensajeNoti = document.getElementById("mensajeNoti");
        if (mensajeNoti) {
            mensajeNoti.innerHTML = `<i class="fa fa-bell"></i> ${texto}`;
            mensajeNoti.style.display = "block";
            setTimeout(() => { mensajeNoti.style.display = "none"; }, 4000);
        }
    }
</script>
