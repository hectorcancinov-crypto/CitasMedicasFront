<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctores - ClinicApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="./CSS/doctores.css" rel="stylesheet">
    <style>
        body { margin:0; background:#f4f6f9; font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        
        .sidebar { width:240px; height:100vh; background:#4db6ac; position:fixed; color:white; padding-top:20px; transition:0.3s; z-index:1000; left: 0; }
        .sidebar.active { left: -240px; }
        .sidebar h4 { text-align:center; font-weight:bold; }
        .sidebar a { display:block; color:white; padding:12px 20px; text-decoration:none; transition:0.3s; }
        .sidebar a:hover, .sidebar a.active { background:#00838f; }
        
        .content { margin-left:240px; padding:30px; transition:0.3s; min-height: 100vh; }
        .content.active { margin-left: 0; }

        .topbar { display:flex; justify-content:space-between; align-items:center; background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        .btn-menu { background: #4db6ac; border: none; color: white; font-size: 20px; cursor: pointer; padding: 5px 12px; border-radius: 5px; display: block !important; }
        .btn-menu:hover { background: #00838f; }

        .notificacion { font-size:20px; cursor:pointer; background:#f4f6f9; padding:10px; border-radius:50%; transition: 0.3s; }
        .notificacion:hover { background: #e0e0e0; }

        @media (max-width:768px) {
            .sidebar { left:-240px; }
            .sidebar.active { left:0; }
            .content { margin-left:0; }
        }
    </style>
</head>

<body>

<div class="sidebar" id="sidebar">
    <h4 class="text-center">ClinicApp</h4>
    <hr>
    <a href="inicio.html"><i class="fa fa-home"></i> Inicio</a>
    <a href="doctores.html" class="active"><i class="fa fa-user-md"></i> Ver doctores</a>
    <a href="agendar-cita.html"><i class="fa fa-calendar-plus"></i> Agendar cita</a>
    <a href="estadocita.html"><i class="fa fa-clock"></i> Estado de cita</a>
    <a href="perfil.html"><i class="fa fa-user"></i> Perfil</a>
    <hr>
    <a href="../login.html" onclick="localStorage.clear()" class="text-danger"><i class="fa fa-sign-out-alt"></i> Cerrar sesión</a>
</div>

<div class="content" id="content">
    <div class="topbar">
        <div class="d-flex align-items-center gap-3">
            <button id="btnMenu" class="btn-menu">
                <i class="fa fa-bars"></i>
            </button>
            <h2 class="m-0" style="font-size: 1.5rem;">Doctores disponibles</h2>
        </div>
        <div class="d-flex align-items-center">
            <i class="fa fa-bell notificacion" id="campana"></i>
        </div>
    </div>

    <div class="row mt-4" id="contenedorDoctores">
        <div class="col-12 text-center">
            <p>Cargando doctores...</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
   const API_URL = "https://clinicaapi-production.up.railway.app";
    const contenedorDoctores = document.getElementById("contenedorDoctores");

    document.addEventListener("DOMContentLoaded", () => {
        const btnMenu = document.getElementById("btnMenu");
        const sidebar = document.getElementById("sidebar");
        const content = document.getElementById("content");

        if (btnMenu) {
            btnMenu.onclick = () => {
                sidebar.classList.toggle("active");
                content.classList.toggle("active");
            };
        }

        document.getElementById("campana").onclick = () => {
            Swal.fire({
                title: 'Notificaciones',
                text: 'Lista de doctores actualizada.',
                icon: 'info',
                timer: 2000,
                showConfirmButton: false
            });
        };

        cargarDoctores();
    });

    async function cargarDoctores() {
        try {
            const respuesta = await fetch(`${API_URL}/pacientes/doctores`);
            if (!respuesta.ok) throw new Error("Error en la red");
            const doctores = await respuesta.json();
            renderizarDoctores(doctores);
        } catch (error) {
            console.error("❌ Error:", error);
            contenedorDoctores.innerHTML = `
                <div class="col-12 text-center">
                    <div class="alert alert-warning border-0 shadow-sm">No se pudo conectar con el servidor Java.</div>
                </div>`;
        }
    }

    function renderizarDoctores(lista) {
        contenedorDoctores.innerHTML = ""; 
        if (lista.length === 0) {
            contenedorDoctores.innerHTML = "<h4 class='text-center mt-5'>No hay doctores disponibles.</h4>";
            return;
        }
        lista.forEach(doc => {
            const div = document.createElement("div");
            div.className = "col-md-4 mb-4";
            div.innerHTML = `
                <div class="card-doctor">
                    <div class="avatar">
                        <i class="fa fa-user-md"></i>
                    </div>
                    <h5>Dr. ${doc.nombre}</h5>
                    <p class="text-muted">${doc.especialidad}</p>
                    <button onclick="verHorarios(${doc.id_doctor})" class="btn btn-success w-100">
                        Ver horarios
                    </button>
                </div>`;
            contenedorDoctores.appendChild(div);
        });
    }

    function verHorarios(idDoctor) {
        localStorage.setItem("id_doctor_elegido", idDoctor);
        window.location.href = "agendar-cita.html";
    }
</script>
</body>
</html>
