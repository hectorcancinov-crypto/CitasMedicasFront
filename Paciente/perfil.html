<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - ClinicApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { margin:0; background:#f4f6f9; font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        
        /* SIDEBAR UNIFICADO */
        .sidebar { width:240px; height:100vh; background:#4db6ac; position:fixed; color:white; padding-top:20px; transition:0.3s; z-index:1000; left: 0; }
        .sidebar.active { left: -240px; }
        .sidebar h4 { text-align:center; font-weight:bold; }
        .sidebar a { display:block; color:white; padding:12px 20px; text-decoration:none; transition:0.3s; }
        .sidebar a:hover, .sidebar a.active { background:#00838f; }
        
        /* CONTENIDO */
        .content { margin-left:240px; padding:30px; transition:0.3s; min-height: 100vh; }
        .content.active { margin-left: 0; }

        .topbar { display:flex; justify-content:space-between; align-items:center; background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        .btn-menu { background: #4db6ac; border: none; color: white; font-size: 20px; cursor: pointer; padding: 5px 12px; border-radius: 5px; display: block !important; }
        .btn-menu:hover { background: #00838f; }

        .notificacion { font-size:20px; cursor:pointer; background:#f4f6f9; padding:10px; border-radius:50%; transition: 0.3s; }

        /* CARD Y FORM */
        .card { border:none; border-radius:12px; box-shadow:0 4px 15px rgba(0,0,0,0.1); }
        .form-control, .form-select { border-radius:10px; padding:10px 14px; }

        @media (max-width:768px) {
            .sidebar { left:-240px; }
            .sidebar.active { left:0; }
            .content { margin-left:0; }
        }
    </style>
</head>

<body>

<div class="sidebar" id="sidebar">
    <h4 class="text-center">ClinicApp</h4>
    <hr>
    <a href="inicio.html"><i class="fa fa-home"></i> Inicio</a>
    <a href="doctores.html"><i class="fa fa-user-md"></i> Ver doctores</a>
    <a href="agendar-cita.html"><i class="fa fa-calendar-plus"></i> Agendar cita</a>
    <a href="estadocita.html"><i class="fa fa-clock"></i> Estado de cita</a>
    <a href="perfil.html" class="active"><i class="fa fa-user"></i> Perfil</a>
    <hr>
    <a href="../login.html" onclick="localStorage.clear()" class="text-danger"><i class="fa fa-sign-out-alt"></i> Cerrar sesión</a>
</div>

<div class="content" id="content">
    <div class="topbar">
        <div class="d-flex align-items-center gap-3">
            <button id="btnMenu" class="btn-menu"><i class="fa fa-bars"></i></button>
            <h2 class="m-0" style="font-size: 1.5rem;">Mi Perfil</h2>
        </div>
        <div class="d-flex align-items-center">
            <i class="fa fa-bell notificacion" id="campana"></i>
        </div>
    </div>

    <div class="card mt-4 p-4">
        <h5 class="mb-4"><i class="fa fa-id-card text-teal" style="color: #4db6ac;"></i> Datos personales</h5>
        <form onsubmit="actualizarPerfil(event)">
            <label class="form-label">Nombre completo</label>
            <input type="text" id="nombre" class="form-control mb-3" placeholder="Tu nombre completo" required>

            <label class="form-label">Edad</label>
            <input type="number" id="edad" class="form-control mb-3" placeholder="Edad" required>

            <label class="form-label">Sexo</label>
            <select id="sexo" class="form-select mb-3" required>
                <option value="">Seleccione</option>
                <option value="Masculino">Masculino</option>
                <option value="Femenino">Femenino</option>
            </select>

            <label class="form-label">Teléfono</label>
            <input type="tel" id="telefono" class="form-control mb-3" placeholder="Número de teléfono" required>

            <label class="form-label">Correo</label>
            <input type="email" id="correo" class="form-control mb-3" placeholder="Correo electrónico" required>

            <button type="submit" class="btn btn-success w-100 py-2 mt-3" style="background: #4db6ac; border: none;">
                Actualizar Perfil
            </button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
   const API_URL = "https://clinicaapi-production.up.railway.app";
    const idUsuario = localStorage.getItem("id_usuario");

    document.addEventListener("DOMContentLoaded", () => {
        // LÓGICA HAMBURGUESA UNIFICADA
        const btnMenu = document.getElementById("btnMenu");
        const sidebar = document.getElementById("sidebar");
        const content = document.getElementById("content");

        btnMenu.onclick = () => {
            sidebar.classList.toggle("active");
            content.classList.toggle("active");
        };

        // LÓGICA CAMPANITA
        document.getElementById("campana").onclick = () => {
            Swal.fire({
                title: 'Notificaciones',
                text: 'No tienes mensajes nuevos en tu perfil.',
                icon: 'info',
                timer: 2000,
                showConfirmButton: false
            });
        };

        cargarPerfil();
    });

    // --- TU LÓGICA DE API INTACTA ---
    async function cargarPerfil() {
        if (!idUsuario) {
            window.location.href = "../login.html";
            return;
        }
        try {
            const resp = await fetch(`${API_URL}/usuarios/${idUsuario}/perfil`);
            if (resp.ok) {
                const data = await resp.json();
                document.getElementById("nombre").value = data.nombre || "";
                document.getElementById("correo").value = data.correo || "";
                document.getElementById("edad").value = data.edad || "";
                document.getElementById("sexo").value = data.sexo || "";
                document.getElementById("telefono").value = data.telefono || "";
            }
        } catch (error) {
            console.error("Error al cargar perfil:", error);
        }
    }

    async function actualizarPerfil(e) {
        e.preventDefault();
        const datos = {
            nombre: document.getElementById("nombre").value,
            correo: document.getElementById("correo").value,
            edad: document.getElementById("edad").value,
            sexo: document.getElementById("sexo").value,
            telefono: document.getElementById("telefono").value
        };

        try {
            const resp = await fetch(`${API_URL}/usuarios/${idUsuario}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(datos)
            });

            if (resp.ok) {
                Swal.fire({
                    icon: 'success',
                    title: '¡Guardado!',
                    text: 'Tus datos se actualizaron correctamente.',
                    timer: 2000,
                    showConfirmButton: false
                });
            } else {
                Swal.fire('Error', 'No se pudo guardar la información', 'error');
            }
        } catch (error) {
            Swal.fire('Error', 'Servidor fuera de línea', 'error');
        }
    }
</script> 
</body>
</html>
