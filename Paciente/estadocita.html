<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estado de cita - ClinicApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="CSS/estodocita.css">
    <link rel="stylesheet" href="CSS/inicio.css"> 
    <style>
        body { margin:0; background:#f4f6f9; font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        
        /* SIDEBAR UNIFICADO */
        .sidebar { width:240px; height:100vh; background:#4db6ac; position:fixed; color:white; padding-top:20px; transition:0.3s; z-index:1000; left: 0; }
        .sidebar.active { left: -240px; }
        .sidebar h4 { text-align:center; font-weight:bold; }
        .sidebar a { display:block; color:white; padding:12px 20px; text-decoration:none; transition:0.3s; }
        .sidebar a:hover, .sidebar a.active { background:#00838f; }
        
        /* CONTENIDO */
        .content { margin-left:240px; padding:30px; transition:0.3s; min-height: 100vh; }
        .content.active { margin-left: 0; }

        .topbar { display:flex; justify-content:space-between; align-items:center; background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        .btn-menu { background: #4db6ac; border: none; color: white; font-size: 20px; cursor: pointer; padding: 5px 12px; border-radius: 5px; display: block !important; }
        .btn-menu:hover { background: #00838f; }

        .notificacion { font-size:20px; cursor:pointer; background:#f4f6f9; padding:10px; border-radius:50%; transition: 0.3s; }

        @media (max-width:768px) {
            .sidebar { left:-240px; }
            .sidebar.active { left:0; }
            .content { margin-left:0; }
        }
    </style>
</head>

<body>

<div class="sidebar" id="sidebar">
    <h4 class="text-center">ClinicApp</h4>
    <hr>
    <a href="inicio.html"><i class="fa fa-home"></i> Inicio</a>
    <a href="doctores.html"><i class="fa fa-user-md"></i> Ver doctores</a>
    <a href="agendar-cita.html"><i class="fa fa-calendar-plus"></i> Agendar cita</a>
    <a href="estadocita.html" class="active"><i class="fa fa-clock"></i> Estado de cita</a>
    <a href="perfil.html"><i class="fa fa-user"></i> Perfil</a>
    <hr>
    <a href="../login.html" onclick="localStorage.clear()" class="text-danger"><i class="fa fa-sign-out-alt"></i> Cerrar sesión</a>
</div>

<div class="content" id="content">
    <div class="topbar">
        <div class="d-flex align-items-center gap-3">
            <button id="btnMenu" class="btn-menu">
                <i class="fa fa-bars"></i>
            </button>
            <h2 class="m-0" style="font-size: 1.5rem;">Estado de citas</h2>
        </div>
        <div class="d-flex align-items-center">
            <i class="fa fa-bell notificacion" id="campana"></i>
        </div>
    </div>

    <div class="card mt-4 p-3 tabla-desktop border-0 shadow-sm" style="border-radius: 15px;">
        <table class="table table-hover align-middle">
            <thead>
                <tr>
                    <th>Doctor</th>
                    <th>Fecha</th>
                    <th>Hora</th>
                    <th>Estado</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="tablaCitas"></tbody>
        </table>
    </div>

    <div class="cards-mobile mt-4" id="cardsCitas"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    const API_URL = "https://clinicaapi-production.up.railway.app";
    
    // CORRECCIÓN CLAVE: Usamos id_paciente que viene del AuthController corregido
    const idPaciente = localStorage.getItem("id_paciente");
    const tablaCitas = document.getElementById("tablaCitas");
    const cardsCitas = document.getElementById("cardsCitas");

    document.addEventListener("DOMContentLoaded", () => {
        // Manejo del menú lateral
        const btnMenu = document.getElementById("btnMenu");
        const sidebar = document.getElementById("sidebar");
        const content = document.getElementById("content");

        if(btnMenu) {
            btnMenu.onclick = () => {
                sidebar.classList.toggle("active");
                content.classList.toggle("active");
            };
        }

        // Campanita de info
        document.getElementById("campana").onclick = () => {
            Swal.fire({
                title: 'Info de Citas',
                text: 'Aquí verás si el doctor aceptó tu solicitud.',
                icon: 'info',
                confirmButtonColor: '#4db6ac'
            });
        };

        cargarMisCitas();
    });

    async function cargarMisCitas() {
        // Si no hay ID, mandamos al login
        if (!idPaciente || idPaciente === "0" || idPaciente === "null") {
            console.error("No se encontró id_paciente en localStorage");
            tablaCitas.innerHTML = `<tr><td colspan="5" class="text-center text-danger">Error de sesión. Por favor inicia sesión de nuevo.</td></tr>`;
            return;
        }

        try {
            const resp = await fetch(`${API_URL}/pacientes/${idPaciente}/citas`);
            if (!resp.ok) throw new Error("Error al obtener datos");
            
            const citas = await resp.json();
            tablaCitas.innerHTML = "";
            cardsCitas.innerHTML = "";

            if (!citas || citas.length === 0) {
                const mensaje = `<div class="text-center p-4"><p class="text-muted">Aún no tienes citas agendadas.</p></div>`;
                tablaCitas.innerHTML = `<tr><td colspan="5">${mensaje}</td></tr>`;
                cardsCitas.innerHTML = mensaje;
                return;
            }

            citas.forEach(c => {
                // Lógica de colores según el estado
                let badgeClass = "bg-warning"; // PENDIENTE
                if (c.estado === "ACEPTADA") badgeClass = "bg-success";
                if (c.estado === "RECHAZADA") badgeClass = "bg-danger";

                // Insertar en Tabla (Desktop)
                const fila = document.createElement("tr");
                fila.innerHTML = `
                    <td><strong>${c.nombre_doctor || 'Doctor Asignado'}</strong></td>
                    <td>${c.fecha}</td>
                    <td>${c.hora}</td>
                    <td><span class="badge ${badgeClass}">${c.estado}</span></td>
                    <td>
                        <button class="btn btn-sm btn-outline-danger" onclick="cancelarCita(${c.id_cita})">
                            <i class="fa fa-trash"></i>
                        </button>
                    </td>
                `;
                tablaCitas.appendChild(fila);

                // Insertar en Cards (Mobile)
                const card = document.createElement("div");
                card.className = "card mb-3 shadow-sm border-0 p-2";
                card.style.borderLeft = `5px solid ${c.estado === 'ACEPTADA' ? '#43a047' : '#ffa000'}`;
                card.innerHTML = `
                    <div class="card-body">
                        <h6 class="fw-bold">${c.nombre_doctor || 'Doctor'}</h6>
                        <p class="small mb-1"><i class="fa fa-calendar"></i> ${c.fecha} | <i class="fa fa-clock"></i> ${c.hora}</p>
                        <span class="badge ${badgeClass}">${c.estado}</span>
                        <div class="text-end mt-2">
                            <button class="btn btn-sm btn-danger" onclick="cancelarCita(${c.id_cita})">Eliminar</button>
                        </div>
                    </div>
                `;
                cardsCitas.appendChild(card);
            });
        } catch (error) {
            tablaCitas.innerHTML = `<tr><td colspan="5" class="text-center text-danger">Error de conexión con el servidor.</td></tr>`;
        }
    }

    async function cancelarCita(id) {
        const result = await Swal.fire({
            title: '¿Eliminar cita?',
            text: "No podrás deshacer esta acción.",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#e53935',
            cancelButtonColor: '#6c757d',
            confirmButtonText: 'Sí, eliminar',
            cancelButtonText: 'Cancelar'
        });

        if (result.isConfirmed) {
            try {
                const resp = await fetch(`${API_URL}/citas/${id}`, { method: 'DELETE' });
                if (resp.ok) {
                    Swal.fire('¡Eliminada!', 'La cita ha sido cancelada.', 'success');
                    cargarMisCitas();
                } else {
                    Swal.fire('Error', 'No se pudo cancelar la cita.', 'error');
                }
            } catch (error) {
                Swal.fire('Error', 'Servidor no disponible.', 'error');
            }
        }
    }
</script>
</body>
</html>
